<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALMA — Accesorios con Esencia Propia</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Raleway:ital,wght@0,200;0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9922A;
    --gold-light: #E8B84B;
    --gold-pale: #F2D78E;
    --gold-dim: #7A5510;
    --black: #111010;
    --black-soft: #1A1918;
    --black-card: #1E1C1A;
    --black-hover: #252220;
    --white: #F0EAE0;
    --white-dim: #A89F92;
    --white-muted: #6B6058;
    --overlay: rgba(10,9,8,0.94);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* Subtle grain */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px 80px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(201,146,42,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Decorative lines */
  .hero-line-left,
  .hero-line-right {
    position: absolute;
    top: 50%;
    width: 18%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,146,42,0.35));
    transform: translateY(-50%);
  }
  .hero-line-left { left: 0; transform: translateY(-50%) rotate(180deg); }
  .hero-line-right { right: 0; }

  /* Logo SVG */
  .logo-svg-wrap {
    width: 100px;
    height: 100px;
    margin-bottom: 28px;
    animation: fadeDown 0.9s ease both;
    filter: drop-shadow(0 0 20px rgba(201,146,42,0.25));
  }

  .logo-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(48px, 12vw, 88px);
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--white);
    line-height: 1;
    animation: fadeDown 0.9s 0.1s ease both;
    text-shadow: 0 0 40px rgba(201,146,42,0.15);
  }

  .tagline {
    font-size: clamp(8px, 1.8vw, 10px);
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 14px;
    animation: fadeDown 0.9s 0.2s ease both;
    font-weight: 400;
  }

  .hero-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 32px auto;
    width: 200px;
    animation: fadeDown 0.9s 0.3s ease both;
  }

  .hero-divider span {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,146,42,0.4), transparent);
  }

  .hero-divider-icon {
    color: var(--gold);
    font-size: 12px;
    opacity: 0.7;
  }

  .hero-sub {
    font-size: 13px;
    color: var(--white-dim);
    letter-spacing: 0.08em;
    line-height: 1.9;
    max-width: 320px;
    font-style: italic;
    animation: fadeDown 0.9s 0.4s ease both;
  }

  .scroll-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: fadeDown 1s 0.8s ease both;
  }

  .scroll-hint span {
    font-size: 7px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--white-muted);
  }

  .scroll-arrow {
    width: 1px;
    height: 36px;
    background: linear-gradient(to bottom, rgba(201,146,42,0.6), transparent);
    animation: scrollPulse 2s ease infinite;
  }

  @keyframes scrollPulse {
    0%, 100% { opacity: 0.4; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.2); }
  }

  /* ── CATALOG SECTION ── */
  .catalog-section {
    padding: 0 0 80px;
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 0 0 48px;
    border-bottom: 1px solid rgba(201,146,42,0.1);
    margin-bottom: 48px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .filter-btn {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--white-muted);
    font-family: 'Raleway', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    padding: 16px 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
    position: relative;
  }

  .filter-btn::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 2px;
    background: var(--gold);
    transition: width 0.3s ease;
  }

  .filter-btn:hover { color: var(--white); }
  .filter-btn:hover::after { width: 60%; }

  .filter-btn.active {
    color: var(--gold-light);
  }
  .filter-btn.active::after { width: 80%; }

  /* Grid */
  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 3px;
    padding: 0 3px;
    max-width: 1000px;
    margin: 0 auto;
  }

  @media (min-width: 600px) {
    .catalog-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 900px) {
    .catalog-grid { grid-template-columns: repeat(4, 1fr); }
  }

  /* Product card */
  .product-card {
    background: var(--black-card);
    position: relative;
    cursor: pointer;
    overflow: hidden;
    aspect-ratio: 3/4;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .product-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    filter: brightness(0.85) saturate(0.9);
  }

  .product-card:hover .product-img {
    transform: scale(1.06);
    filter: brightness(1) saturate(1);
  }

  .product-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(17,16,16,0.92) 0%,
      rgba(17,16,16,0.4) 40%,
      transparent 70%
    );
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 18px 16px;
    transition: background 0.3s ease;
  }

  .product-card:hover .product-overlay {
    background: linear-gradient(
      to top,
      rgba(17,16,16,0.95) 0%,
      rgba(17,16,16,0.5) 50%,
      transparent 70%
    );
  }

  .product-category {
    font-size: 7px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 5px;
    font-weight: 500;
  }

  .product-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(13px, 3vw, 16px);
    font-weight: 300;
    color: var(--white);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .product-price {
    font-size: 12px;
    color: var(--gold-light);
    font-weight: 400;
    letter-spacing: 0.05em;
  }

  /* View hint on hover */
  .product-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(201,146,42,0.9);
    color: var(--black);
    font-size: 7px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 8px 16px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  .product-card:hover .product-hint { opacity: 1; }

  /* Badge */
  .badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--gold);
    color: var(--black);
    font-family: 'Cinzel', serif;
    font-size: 6px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 9px;
    font-weight: 600;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--overlay);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--black-card);
    width: 100%;
    max-width: 480px;
    max-height: 88vh;
    overflow-y: auto;
    border-top: 1px solid rgba(201,146,42,0.25);
    transform: translateY(100%);
    transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    scrollbar-width: none;
  }

  .modal::-webkit-scrollbar { display: none; }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 18px;
    background: none;
    border: 1px solid rgba(201,146,42,0.2);
    color: var(--white-dim);
    font-size: 13px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: all 0.2s;
  }

  .modal-close:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .modal-img-wrap {
    position: relative;
    height: 260px;
    overflow: hidden;
  }

  .modal-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.9);
  }

  .modal-img-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: linear-gradient(to top, var(--black-card), transparent);
  }

  .modal-body {
    padding: 24px 22px 40px;
  }

  .modal-cat {
    font-size: 8px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .modal-name {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 300;
    line-height: 1.15;
    margin-bottom: 14px;
    color: var(--white);
    letter-spacing: 0.05em;
  }

  .modal-tagline {
    font-size: 11px;
    line-height: 1.9;
    color: var(--white-dim);
    margin-bottom: 20px;
    font-style: italic;
    font-weight: 300;
    padding-left: 12px;
    border-left: 2px solid rgba(201,146,42,0.35);
  }

  .modal-price-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 22px;
  }

  .modal-price {
    font-family: 'Cinzel', serif;
    font-size: 24px;
    color: var(--gold-light);
    font-weight: 400;
  }

  .modal-price-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--white-muted);
  }

  .modal-details {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .detail-pill {
    border: 1px solid rgba(201,146,42,0.2);
    padding: 5px 12px;
    font-size: 8px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--white-muted);
    font-weight: 400;
    transition: border-color 0.2s, color 0.2s;
  }

  .detail-pill:hover {
    border-color: rgba(201,146,42,0.5);
    color: var(--white-dim);
  }

  .btn-whatsapp {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: #25D366;
    color: #fff;
    font-family: 'Raleway', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 17px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }

  .btn-whatsapp:hover {
    background: #20c55a;
    transform: translateY(-1px);
  }

  .btn-whatsapp:active { transform: translateY(0); }

  .btn-whatsapp svg {
    width: 17px;
    height: 17px;
    fill: #fff;
    flex-shrink: 0;
  }

  /* ── BRAND STRIP ── */
  .brand-strip {
    padding: 60px 24px;
    text-align: center;
    border-top: 1px solid rgba(201,146,42,0.08);
    border-bottom: 1px solid rgba(201,146,42,0.08);
    margin: 60px 0 0;
  }

  .strip-eyebrow {
    font-size: 8px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .strip-text {
    font-family: 'Cinzel', serif;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 300;
    color: var(--white);
    letter-spacing: 0.05em;
    line-height: 1.6;
    max-width: 500px;
    margin: 0 auto;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 50px 24px 40px;
  }

  .footer-logo-svg {
    width: 48px;
    height: 48px;
    margin: 0 auto 16px;
    opacity: 0.6;
  }

  .footer-brand {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    letter-spacing: 0.35em;
    color: var(--gold-dim);
    margin-bottom: 6px;
  }

  .footer-tag {
    font-size: 8px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--white-muted);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); }
</style>
</head>

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
const catalog = document.getElementById('catalog');

function renderCards(filter = 'all') {
  catalog.innerHTML = '';
  const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);

  if (filtered.length === 0) {
    catalog.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 24px;color:var(--white-muted);font-size:11px;letter-spacing:0.3em;text-transform:uppercase;">Próximamente</div>`;
    return;
  }

  filtered.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.animationDelay = `${i * 0.07}s`;
    card.innerHTML = `
      <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
      ${p.isNew ? '<div class="badge">Nuevo</div>' : ''}
      <div class="product-hint">Ver detalle</div>
      <div class="product-overlay">
        <div class="product-category">${p.categoryLabel}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${p.price}</div>
      </div>
    `;
    card.addEventListener('click', () => openModal(p));
    catalog.appendChild(card);
  });
}

// ─────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────
const overlay = document.getElementById('modalOverlay');
const modalClose = document.getElementById('modalClose');

function openModal(p) {
  document.getElementById('modalImg').src = p.img;
  document.getElementById('modalImg').alt = p.name;
  document.getElementById('modalCat').textContent = p.categoryLabel;
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalTagline').textContent = p.tagline;
  document.getElementById('modalPrice').textContent = p.price;

  const detailsEl = document.getElementById('modalDetails');
  detailsEl.innerHTML = p.details.map(d => `<span class="detail-pill">${d}</span>`).join('');

  const msg = encodeURIComponent(`Hola ALMA ✨ Me interesa el accesorio *${p.name}* (${p.price}). ¿Está disponible?`);
  document.getElementById('modalWA').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.filter);
  });
});

// INIT
renderCards();
</script>
