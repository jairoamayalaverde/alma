<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALMA — Accesorios con Esencia Propia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #8B6914;
    --black: #0A0A0A;
    --black-soft: #111111;
    --black-card: #161616;
    --white: #F5F0E8;
    --white-dim: #B8B0A0;
    --overlay: rgba(10,10,10,0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 56px 24px 40px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 28px auto 0;
    opacity: 0.6;
  }

  .logo-symbol {
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  .logo-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 10vw, 72px);
    font-weight: 300;
    letter-spacing: 0.18em;
    color: var(--white);
    line-height: 1;
    position: relative;
  }

  .logo-name span {
    color: var(--gold);
  }

  .tagline {
    font-size: 9px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--white-dim);
    margin-top: 10px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 20px 36px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--white-dim);
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 8px 18px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .filter-btn:hover,
  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--black);
  }

  /* GRID */
  .catalog-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    padding: 0 2px;
    max-width: 900px;
    margin: 0 auto;
  }

  @media (min-width: 600px) {
    .catalog-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (min-width: 900px) {
    .catalog-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  /* PRODUCT CARD */
  .product-card {
    background: var(--black-card);
    position: relative;
    cursor: pointer;
    overflow: hidden;
    aspect-ratio: 3/4;
    animation: fadeUp 0.5s ease both;
  }

  .product-card:nth-child(1) { animation-delay: 0.05s; }
  .product-card:nth-child(2) { animation-delay: 0.10s; }
  .product-card:nth-child(3) { animation-delay: 0.15s; }
  .product-card:nth-child(4) { animation-delay: 0.20s; }
  .product-card:nth-child(5) { animation-delay: 0.25s; }
  .product-card:nth-child(6) { animation-delay: 0.30s; }
  .product-card:nth-child(7) { animation-delay: 0.35s; }
  .product-card:nth-child(8) { animation-delay: 0.40s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .product-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease;
    filter: brightness(0.9);
  }

  .product-card:hover .product-img {
    transform: scale(1.05);
    filter: brightness(1);
  }

  .product-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, transparent 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 16px;
    opacity: 1;
    transition: opacity 0.3s ease;
  }

  .product-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--white);
    line-height: 1.2;
    margin-bottom: 3px;
  }

  .product-category {
    font-size: 8px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .product-price {
    font-size: 13px;
    color: var(--gold-light);
    margin-top: 6px;
    font-weight: 500;
  }

  /* NEW badge */
  .badge-new {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--gold);
    color: var(--black);
    font-size: 7px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 4px 8px;
    font-weight: 600;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--overlay);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(8px);
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--black-card);
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    border-top: 1px solid rgba(201,168,76,0.3);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    color: var(--white-dim);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    z-index: 10;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--gold); }

  .modal-img {
    width: 100%;
    height: 280px;
    object-fit: cover;
    display: block;
  }

  .modal-body {
    padding: 28px 24px 36px;
  }

  .modal-cat {
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .modal-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 400;
    line-height: 1.1;
    margin-bottom: 12px;
    color: var(--white);
  }

  .modal-desc {
    font-size: 12px;
    line-height: 1.8;
    color: var(--white-dim);
    margin-bottom: 20px;
  }

  .modal-price {
    font-size: 22px;
    color: var(--gold-light);
    font-weight: 500;
    margin-bottom: 24px;
    font-family: 'Cormorant Garamond', serif;
  }

  .modal-details {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .detail-pill {
    border: 1px solid rgba(201,168,76,0.25);
    padding: 5px 12px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--white-dim);
  }

  .btn-whatsapp {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: #25D366;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 16px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }

  .btn-whatsapp:hover { background: #1ebe59; }

  .btn-whatsapp svg {
    width: 18px;
    height: 18px;
    fill: #fff;
    flex-shrink: 0;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 48px 24px;
    margin-top: 40px;
    border-top: 1px solid rgba(201,168,76,0.15);
  }

  .footer-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .footer-tag {
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--white-dim);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); }

  /* HIDDEN filter */
  .product-card.hidden { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo-symbol">✦ Colección 2025 ✦</div>
  <div class="logo-name">ALM<span>A</span></div>
  <div class="tagline">Accesorios con Esencia Propia</div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">Todo</button>
  <button class="filter-btn" data-filter="aretes">Aretes</button>
  <button class="filter-btn" data-filter="anillos">Anillos</button>
  <button class="filter-btn" data-filter="collares">Collares</button>
  <button class="filter-btn" data-filter="pulseras">Pulseras</button>
</div>

<main class="catalog-grid" id="catalog">
  <!-- Los productos se renderizan aquí via JS -->
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-body">
      <div class="modal-cat" id="modalCat"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-details" id="modalDetails"></div>
      <a class="btn-whatsapp" id="modalWA" href="#" target="_blank">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Pedir por WhatsApp
      </a>
    </div>
  </div>
</div>

<footer>
  <div class="footer-brand">ALMA</div>
  <div class="footer-tag">Accesorios con Esencia Propia</div>
</footer>

<script>
// ─────────────────────────────────────────────
// DATOS DEL CATÁLOGO — Edita aquí tus productos
// Reemplaza "img" con la URL real de cada foto
// ─────────────────────────────────────────────
const WHATSAPP_NUMBER = "573000000000"; // ← Cambia por el número real (código país sin +)

const products = [
  {
    id: 1,
    name: "Perla Dorada",
    category: "aretes",
    categoryLabel: "Aretes",
    price: "$45.000",
    desc: "Aretes de perla cultivada rodeados de micro-perlas y detalles en baño de oro 18k. Elegancia atemporal para cualquier ocasión.",
    details: ["Baño oro 18k", "Perla cultivada", "Cierre mariposa"],
    isNew: true,
    img: "https://images.unsplash.com/photo-1617038220319-276d3cfab638?w=600&q=80"
  },
  {
    id: 2,
    name: "Argolla Animal",
    category: "aretes",
    categoryLabel: "Aretes",
    price: "$38.000",
    desc: "Set doble: arete bola mate negro + argolla dorada con estampado animal print. Versátil y atrevida.",
    details: ["Baño oro 18k", "Resina mate", "Hipoalergénico"],
    isNew: true,
    img: "https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=600&q=80"
  },
  {
    id: 3,
    name: "Rubí Imperial",
    category: "aretes",
    categoryLabel: "Aretes",
    price: "$42.000",
    desc: "Aretes cuadrados con piedra color rubí engastada en montura de oro con detalles granulados. Sofisticación en cada detalle.",
    details: ["Piedra resina", "Baño oro 18k", "Cierre push-back"],
    isNew: false,
    img: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=600&q=80"
  },
  {
    id: 4,
    name: "Luna Nácar",
    category: "aretes",
    categoryLabel: "Aretes",
    price: "$36.000",
    desc: "Aretes circulares con nácar natural en montura dorada minimalista. Luz suave que acompaña cualquier look.",
    details: ["Nácar natural", "Baño oro 18k", "Cierre clip"],
    isNew: false,
    img: "https://images.unsplash.com/photo-1573408301185-9519f94816b5?w=600&q=80"
  },
  {
    id: 5,
    name: "Cadena Estela",
    category: "collares",
    categoryLabel: "Collar",
    price: "$65.000",
    desc: "Collar de cadena fina con dije central geométrico. Diseño minimalista de alto impacto.",
    details: ["Baño oro 18k", "45 cm ajustable", "Cierre langosta"],
    isNew: true,
    img: "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=600&q=80"
  },
  {
    id: 6,
    name: "Pulsera Selene",
    category: "pulseras",
    categoryLabel: "Pulsera",
    price: "$52.000",
    desc: "Pulsera rígida con acabado mate y detalles texturizados. Pieza statement que habla por sí sola.",
    details: ["Baño oro 18k", "Talla única", "Antialérgico"],
    isNew: false,
    img: "https://images.unsplash.com/photo-1602173574767-37ac01994b2a?w=600&q=80"
  },
  {
    id: 7,
    name: "Anillo Solsticio",
    category: "anillos",
    categoryLabel: "Anillo",
    price: "$48.000",
    desc: "Anillo abierto con piedra oval engastada. Diseño ajustable que se adapta a tu estilo.",
    details: ["Piedra sintética", "Baño oro 18k", "Talla ajustable"],
    isNew: true,
    img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=600&q=80"
  },
  {
    id: 8,
    name: "Argolla Vintage",
    category: "aretes",
    categoryLabel: "Aretes",
    price: "$34.000",
    desc: "Argollas medianas con acabado satinado. El clásico que nunca falla, elevado por la calidad ALMA.",
    details: ["Baño oro 18k", "Ø 3 cm", "Cierre bisagra"],
    isNew: false,
    img: "https://images.unsplash.com/photo-1630019852942-f89202989a59?w=600&q=80"
  }
];

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
const catalog = document.getElementById('catalog');

function renderCards(filter = 'all') {
  catalog.innerHTML = '';
  const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
  filtered.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.animationDelay = `${i * 0.06}s`;
    card.dataset.id = p.id;
    card.innerHTML = `
      <img class="product-img" src="${p.img}" alt="${p.name}" loading="lazy">
      ${p.isNew ? '<div class="badge-new">Nuevo</div>' : ''}
      <div class="product-overlay">
        <div class="product-category">${p.categoryLabel}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${p.price}</div>
      </div>
    `;
    card.addEventListener('click', () => openModal(p));
    catalog.appendChild(card);
  });
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
const overlay = document.getElementById('modalOverlay');
const modalClose = document.getElementById('modalClose');

function openModal(p) {
  document.getElementById('modalImg').src = p.img;
  document.getElementById('modalImg').alt = p.name;
  document.getElementById('modalCat').textContent = p.categoryLabel;
  document.getElementById('modalName').textContent = p.name;
  document.getElementById('modalDesc').textContent = p.desc;
  document.getElementById('modalPrice').textContent = p.price;

  const detailsEl = document.getElementById('modalDetails');
  detailsEl.innerHTML = p.details.map(d => `<span class="detail-pill">${d}</span>`).join('');

  const msg = encodeURIComponent(`Hola ALMA 🌟 Me interesa el producto *${p.name}* (${p.price}). ¿Está disponible?`);
  document.getElementById('modalWA').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

// ─────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.filter);
  });
});

// INIT
renderCards();
</script>
</body>
</html>
